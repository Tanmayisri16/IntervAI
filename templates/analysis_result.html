<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analysis Result</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 650px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    color: white;
    text-align: center;
}

h2 {
    margin-bottom: 25px;
}

.score {
    font-size: 40px;
    font-weight: bold;
    color: #00c6ff;
}

.progress-bar {
    margin-top: 10px;
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: {{ ats_score }}%;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
}

.section {
    margin-top: 30px;
    text-align: left;
}

.section h3 {
    margin-bottom: 10px;
    color: #00c6ff;
}

ul {
    list-style: none;
}

ul li {
    padding: 8px 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
}

/* ROLE BUTTONS */
.role-buttons {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.role-btn {
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    transition: 0.3s;
}

.role-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,198,255,0.4);
}

.back-btn {
    margin-top: 30px;
    display: inline-block;
    padding: 12px 25px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    background: linear-gradient(90deg, #ff4b2b, #ff416c);
    font-weight: 600;
}
</style>
</head>

<body>

<div class="container">

    <h2>🚀 Resume Analysis Result</h2>

    <div>
        <div>ATS Score</div>
        <div class="score">{{ ats_score }}/100</div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <div class="section">
        <h3>🛠 Detected Skills</h3>
        <ul>
        {% for skill in skills %}
            <li>{{ skill }}</li>
        {% endfor %}
        </ul>
    </div>

    <div class="section">
        <h3>💼 Select a Role to Start Interview</h3>

        <div class="role-buttons">
            {% for role in roles %}
                <form action="{{ url_for('start_interview') }}" method="POST">
                    <input type="hidden" name="selected_role" value="{{ role }}">
                    <button type="submit" class="role-btn">
                        {{ role }}
                    </button>
                </form>
            {% endfor %}
        </div>

    </div>

    <a href="{{ url_for('upload') }}" class="back-btn">
        Analyze Another Resume
    </a>

</div>

</body>
</html>
